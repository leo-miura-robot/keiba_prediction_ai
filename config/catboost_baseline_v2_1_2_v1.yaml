version: catboost_baseline_v2_1_2_v1
input_dataset_dir: outputs/model_feature_dataset_v2_1_2
feature_set_yaml: config/feature_sets_v2_1_2.yaml
output_root: outputs/model_training/catboost_baseline_v2_1_2_v1
model_root: models/catboost_baseline_v2_1_2_v1
old_v1_0_2_output_root: outputs/model_training/catboost_baseline_v1_0_2
old_v1_0_2_model_root: models/catboost_baseline_v1_0_2
random_seed: 42
prediction_tolerance: 1.0e-10
splits:
  train:
    years: [2016, 2017, 2018, 2019, 2020, 2021, 2022, 2023]
  validation:
    years: [2024]
  test:
    years: [2025]
  latest_holdout:
    years: [2026]
phase1_goal:
  win_roi_min: 0.90
  place_roi_min: 0.90
market_aware_notice: "market_aware uses final NL_O1 odds from the current race. It is an ideal-condition final-odds model, not a pre-race live operation model."
training_params:
  iterations: 3000
  learning_rate: 0.05
  depth: 8
  l2_leaf_reg: 5.0
  random_strength: 1.0
  bootstrap_type: Bayesian
  bagging_temperature: 1.0
  loss_function: Logloss
  eval_metric: Logloss
  od_type: Iter
  od_wait: 200
  random_seed: 42
  task_type: GPU
  devices: "0"
  allow_writing_files: false
  verbose: 100
smoke_overrides:
  iterations: 30
  od_wait: 10
  verbose: false
